<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1200">
    <title>📈 价值投资复利计算器</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root { 
            --primary: #2563eb; 
            --primary-dark: #1e40af;
            --secondary: #64748b; 
            --success: #10b981;
            --danger: #ef4444;
            --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: white;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
        }
        
        body { 
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 30px 20px;
            /* 防止移动端自动放大文字 */
            -webkit-text-size-adjust: 100%;
            overflow-x: auto; /* 在窄屏上可以横向滚动，保持桌面布局 */
        }
        
        .container { 
            width: 1200px;
            min-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 60px 0 rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 50px 30px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .subtitle {
            font-size: 1em;
            opacity: 0.9;
            font-weight: 300;
        }
        
        .content {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 40px;
            padding: 40px;
        }
        
        .inputs-card {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        label {
            font-weight: 600;
            font-size: 0.95em;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        input {
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
            background: #f8fafc;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .stats {
            background: linear-gradient(135deg, #eff6ff 0%, #f0f9ff 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            margin-top: 10px;
        }
        
        .stats-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(37, 99, 235, 0.2);
        }
        
        .stats-item:last-child {
            margin-bottom: 0;
            border-bottom: none;
        }
        
        .stats-item span:first-child {
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        
        .stats-item b {
            font-size: 1.2em;
            color: var(--primary);
        }
        
        .stats-item b.danger {
            color: var(--danger);
        }
        
        .chart-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .chart-container {
            position: relative;
            height: 400px;
            background: #fafafa;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
        }
        
        .wechat-section {
            border-top: 1px solid var(--border);
            padding: 30px;
            text-align: center;
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        }
        
        .wechat-section p {
            color: var(--text-secondary);
            margin-bottom: 15px;
            font-size: 0.95em;
        }
        
        .wechat-code img {
            width: 140px;
            height: auto;
            border: 2px solid var(--border);
            border-radius: 8px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .wechat-code img:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        /* 微信内打开提示已移除 */
        
        /* 响应式设计 */
        /* 禁用响应式重排：在所有设备上保持桌面布局，窄屏时允许横向滚动 */
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 380px 1fr;
                gap: 40px;
                padding: 40px;
            }

            h1 {
                font-size: 2.5em;
            }

            input {
                width: auto;
            }

            .chart-container {
                height: 400px;
            }
        }
        
        /* 动画效果 */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .container {
            animation: slideIn 0.6s ease-out;
        }
    </style>
</head>
<body>

<!-- 微信内打开提示已移除 -->

<div class="container">
    <div class="header">
        <h1>📈 价值投资复利计算器</h1>
        <p class="subtitle">智能规划长期投资收益</p>
    </div>

    <div class="content">
        <div class="inputs-card">
            <div class="input-group">
                <label>💰 初始本金 (元)</label>
                <input type="number" id="principal" value="100000" oninput="updateAll()">
            </div>
            <div class="input-group">
                <label>📊 每年追加金额 (元)</label>
                <input type="number" id="annualAddition" value="50000" oninput="updateAll()">
            </div>
            <div class="input-group">
                <label>📈 年收益率 (%)</label>
                <input type="number" id="returnRate" value="15" step="0.1" oninput="updateAll()">
            </div>
            <div class="input-group">
                <label>⏱️ 投资年数</label>
                <input type="number" id="years" value="20" oninput="updateAll()">
            </div>

            <div class="stats" id="summary"></div>
        </div>

        <div class="chart-wrapper">
            <div class="chart-container">
                <canvas id="investmentChart"></canvas>
            </div>
        </div>
    </div>

    <div class="wechat-section">
        <div class="wechat-code">
            <p>更多投资资讯，请长按扫码关注我们的公众号</p>
            <img src="公众号二维码.jpg" alt="WeChat QR Code" />
        </div>
    </div>
</div>

<script>
    let myChart = null;

    class InvestmentCalculator {
        constructor(principal, addition, rate) {
            this.principal = principal;
            this.addition = addition;
            this.rate = rate / 100;
        }

        getData(maxYears) {
            let labels = [];
            let amounts = [];
            let cumulative = [];
            let returns = [];

            let currentAmount = this.principal;
            let currentInvested = this.principal;

            for (let i = 0; i <= maxYears; i++) {
                labels.push(`${i}年`);
                amounts.push(parseFloat(currentAmount.toFixed(2)));
                cumulative.push(parseFloat(currentInvested.toFixed(2)));
                
                let roi = i === 0 ? 0 : ((currentAmount - currentInvested) / currentInvested * 100);
                returns.push(parseFloat(roi.toFixed(2)));

                currentAmount = currentAmount * (1 + this.rate) + this.addition;
                currentInvested += this.addition;
            }
            return { labels, amounts, cumulative, returns };
        }
    }

    function updateAll() {
        const p = parseFloat(document.getElementById('principal').value) || 0;
        const a = parseFloat(document.getElementById('annualAddition').value) || 0;
        const r = parseFloat(document.getElementById('returnRate').value) || 0;
        const y = parseInt(document.getElementById('years').value) || 0;

        const calc = new InvestmentCalculator(p, a, r);
        const data = calc.getData(y);

        const finalAmount = data.amounts[y];
        const finalROI = data.returns[y];
        const totalInvested = data.cumulative[y];
        const totalProfit = finalAmount - totalInvested;

        document.getElementById('summary').innerHTML = `
            <div class="stats-item">
                <span>最终总额</span>
                <b>￥${(finalAmount / 10000).toFixed(2)} 万</b>
            </div>
            <div class="stats-item">
                <span>累计投入</span>
                <b>￥${(totalInvested / 10000).toFixed(2)} 万</b>
            </div>
            <div class="stats-item">
                <span>总收益</span>
                <b class="danger">￥${(totalProfit / 10000).toFixed(2)} 万</b>
            </div>
            <div class="stats-item">
                <span>收益率</span>
                <b class="danger">${finalROI.toFixed(2)}%</b>
            </div>
        `;

        renderChart(data);
    }

    function renderChart(data) {
        const ctx = document.getElementById('investmentChart').getContext('2d');
        
        if (myChart) myChart.destroy();

        // 把总金额转换为「万元」并保留一位小数，图表显示单位为万元
        const amountsWan = data.amounts.map(v => parseFloat((v / 10000).toFixed(1)));

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.labels,
                datasets: [
                    {
                        label: '总金额 (万元)',
                        data: amountsWan,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.08)',
                        yAxisID: 'y',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 2.5,
                        pointRadius: 4,
                        pointBackgroundColor: '#2563eb',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    },
                    {
                        label: '收益率 (%)',
                        data: data.returns,
                        borderColor: '#ef4444',
                        borderDash: [5, 5],
                        yAxisID: 'y1',
                        tension: 0.4,
                        borderWidth: 2,
                        // 和金额曲线一样显示散点
                        pointRadius: 4,
                        pointBackgroundColor: '#ef4444',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: true,
                        position: 'top',
                        labels: { font: { size: 12 }, padding: 15 }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const label = context.dataset.label || '';
                                const value = context.parsed.y;
                                if (label && label.indexOf('总金额') !== -1) {
                                    return label + ': ￥' + value.toFixed(1) + ' 万';
                                }
                                if (label && label.indexOf('收益率') !== -1) {
                                    return label + ': ' + value.toFixed(2) + ' %';
                                }
                                return label + ': ' + value;
                            }
                        }
                    }
                },
                scales: {
                    y: { 
                        type: 'linear',
                        display: true,
                        position: 'left',
                        title: { display: true, text: '总金额 (万元)', font: { weight: 'bold' } },
                        grid: { color: 'rgba(200, 200, 200, 0.1)' },
                        ticks: {
                            callback: function(val) {
                                return val.toFixed(1) + ' 万';
                            }
                        }
                    },
                    y1: { 
                        type: 'linear',
                        display: true,
                        position: 'right',
                        grid: { drawOnChartArea: false },
                        title: { display: true, text: '收益率 (%)', font: { weight: 'bold' } },
                        ticks: {
                            callback: function(val) {
                                return val + ' %';
                            }
                        }
                    }
                }
            }
        });
    }

    window.onload = function() {
        updateAll();
        const ua = navigator.userAgent.toLowerCase();
        if (ua.indexOf('micromessenger') !== -1) {
            document.getElementById('wechatNotice').style.display = 'block';
        }
    };
</script>

</body>
</html>
